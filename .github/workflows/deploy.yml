name: Deploy to GitHub Pages

on:
  # Roda a action sempre que houver um push na branch main
  push:
    branches: ["main"]
  
  # Permite rodar a action manualmente na aba "Actions"
  workflow_dispatch:

# Permissões necessárias para escrever no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Impede que várias builds rodem ao mesmo tempo
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build project
        run: npm run build
        working-directory: ./frontend

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
